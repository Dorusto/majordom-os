services:

  postgres:
    image: postgres:16-alpine
    container_name: majordom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - majordom_network

  # ═══════════════════════════════════════════════════════════════════
  # OPȚIUNEA 1 — Ollama în Docker (INACTIVĂ)
  # Decomentează tot blocul de mai jos dacă vrei Ollama în container.
  # Va descărca automat modelul (~4GB) la primul start.
  # Nu uita să schimbi și OLLAMA_HOST în .env la: http://ollama:11434
  # ═══════════════════════════════════════════════════════════════════
